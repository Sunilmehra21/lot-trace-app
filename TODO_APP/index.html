<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <!-- Header -->
            <header class="header">
                <h1>📋 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </header>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">+</button>
                </div>
                <div class="priority-section">
                    <label for="prioritySelect">Priority:</label>
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span id="totalTasks" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span id="completedTasks" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pending:</span>
                    <span id="pendingTasks" class="stat-value">0</span>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>

            <!-- Todo List -->
            <ul id="todoList" class="todo-list">
                <!-- Tasks will be added here dynamically -->
            </ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <p>📭 No tasks yet. Add one to get started!</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="action-btn clear-btn">Clear Completed</button>
                <button id="clearAllBtn" class="action-btn delete-btn">Clear All</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
